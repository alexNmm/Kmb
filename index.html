<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="九巴附近">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/KMB_Logo.svg/1024px-KMB_Logo.svg.png">
  <title>九巴附近動態</title>
  
  <style>
    :root { --bg: #000; --card: #1c1c1e; --text: #fff; --accent: #ffd60a; --blue: #0a84ff; }
    body { margin: 0; background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; user-select: none; }
    .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    .bus-card { background: var(--card); border-radius: 20px; padding: 16px; margin: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
    .route-num { font-size: 24px; font-weight: 800; }
    .eta-time { font-size: 24px; font-weight: 800; color: var(--accent); }
    .status-area { text-align: center; padding: 40px; color: #888; }
    .install-prompt { display: none; position: fixed; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 18px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; width: 85%; max-width: 340px; text-align: center; }
  </style>
</head>
<body>

  <div class="header">
    <div style="font-weight:700; font-size:18px;">📍 九巴附近</div>
    <button id="refreshBtn" onclick="init()">更新</button>
  </div>
  
  <div id="busList"><div class="status-area">正在搜尋中...</div></div>
  <div id="installPrompt" class="install-prompt"></div>

  <script>
    let stopsCache = null;

    async function fetchWithRetry(url, retries = 3) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (res.ok) return await res.json();
        } catch (e) { if (i === retries - 1) throw e; await new Promise(r => setTimeout(r, 1000)); }
      }
    }

    async function init() {
      document.getElementById("refreshBtn").disabled = true;
      if (!stopsCache) {
        const res = await fetchWithRetry("https://data.etabus.gov.hk/v1/transport/kmb/stop");
        stopsCache = res.data.map(s => ({...s, lat: parseFloat(s.lat), long: parseFloat(s.long)}));
      }
      navigator.geolocation.getCurrentPosition(pos => fetchEtas(pos.coords.latitude, pos.coords.longitude), 
        () => { document.getElementById("busList").innerHTML = "無法定位。"; document.getElementById("refreshBtn").disabled = false; },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 });
    }

    async function fetchEtas(lat, lon) {
      const nearby = stopsCache.sort((a,b) => Math.hypot(a.lat - lat, a.long - lon) - Math.hypot(b.lat - lat, b.long - lon)).slice(0, 5);
      const etas = (await Promise.all(nearby.map(async s => {
        try {
          const res = await fetchWithRetry(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${s.stop}`);
          return (res.data || []).map(e => ({ route: e.route, eta: e.eta, stopName: s.name_tc }));
        } catch { return []; }
      }))).flat().filter(b => b.eta && new Date(b.eta) > new Date()).sort((a,b) => new Date(a.eta) - new Date(b.eta));

      render(etas);
    }

    function render(etas) {
      const list = document.getElementById("busList");
      list.innerHTML = etas.length ? "" : "暫無班次。";
      etas.forEach(bus => {
        let min = Math.max(0, Math.floor((new Date(bus.eta) - new Date()) / 60000));
        list.innerHTML += `<div class="bus-card"><div><div class="route-num">${bus.route}</div><div style="color:#888; font-size:13px;">${bus.stopName}</div></div><div class="eta-time">${min === 0 ? "即將" : min} <span style="font-size:13px; color:#888;">分</span></div></div>`;
      });
      document.getElementById("refreshBtn").disabled = false;
    }

    // 安裝提示檢查
    if (!window.navigator.standalone && !window.matchMedia('(display-mode: standalone)').matches) {
      setTimeout(() => {
        const p = document.getElementById('installPrompt');
        p.innerHTML = `<button class="close-btn" style="position:absolute; top:5px; right:10px; border:none; background:none;" onclick="this.parentElement.style.display='none'">✕</button>
        <div style="font-weight:700; color:var(--blue); margin-bottom:5px;">💡 升級專屬 App</div>
        <div style="font-size:14px;">點擊分享按鈕，選擇「加入主畫面」。</div>`;
        p.style.display = 'block';
      }, 2000);
    }

    init();
  </script>
</body>
</html>
